<!DOCTYPE html>
<html>
<head>
<title>Do You Like Me?</title>
<style>
body{
  text-align:center;
  font-family: Arial;
  background:#ffe6f2;
}

h1{
  margin-top:100px;
  font-size:40px;
}

button{
  padding:15px 25px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:20px;
}

#yes{
  background:#ff4da6;
  color:white;
}

#no{
  background:#999;
  color:white;
  position:absolute;
}

</style>
</head>

<body>

<h1>Do you like me? 💕</h1>

<button id="yes" onclick="yesClicked()">Yes 😊</button>
<button id="no">No 😒</button>

<script>
let noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton(){
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function yesClicked(){
  document.body.innerHTML = "<h1>Yayyy 😍 I like you too 💖</h1>";
}
</script>

</body>
</html>
